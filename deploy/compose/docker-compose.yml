services:
  postgres:
    image: postgres:16-alpine
    container_name: lunie-postgres
    environment:
      POSTGRES_USER: lunie
      POSTGRES_PASSWORD: lunie
      POSTGRES_DB: lunie
    ports:
      - "5432:5432"
    volumes:
      - lunie_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunie -d lunie"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lunie-redis
    ports:
      - "6379:6379"
    volumes:
      - lunie_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lunie_pgdata:
  lunie_redisdata:
